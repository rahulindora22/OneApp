<template>
<lightning-input data-id={indx} label="" value={scc.Name} onchange={handleNameChange}></lightning-input>                               

    <lightning-input data-id={indx} label="" value={scc.Email__c} onchange={handleEmailChange}></lightning-input>                        

    <lightning-input data-id={indx} label="" value={scc.Phone__c} onchange={handlePhoneChange}></lightning-input>

  <!--  <lightning-input data-id={indx} label="" value={scc.Designation__c} onchange={handleDesignationChange}></lightning-input> -->
  <lightning-combobox data-id={indx} name="Industry" value={value}

  options={pickval.data.values} onchange={ondespicChange}>

</lightning-combobox>
 



<div class="slds-align_absolute-center slds-p-top_small">                
    <lightning-button name="Save" label="Save" onclick={saveRecord} ></lightning-button>
</div>

<template if:true={isModalOpen}>
    <!-- Modal/Popup Box LWC starts here -->
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <!-- Modal/Popup Box LWC header here -->
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                    <lightning-icon icon-name="utility:close"
                        alternative-text="close"
                        variant="inverse"
                        size="small" ></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Segment Contact</h2>
            </header>
            <!-- Modal/Popup Box LWC body starts here -->
            <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                <lightning-input data-id={indx} label="Name" value={scc.Name} ></lightning-input>    &nbsp;  &nbsp;  &nbsp;                           
                <lightning-input data-id={indx} label="Email" value={scc.Email__c} ></lightning-input>   
             
                <lightning-input data-id={indx} label="Phone" value={scc.Phone__c} ></lightning-input>  &nbsp;  &nbsp;  &nbsp; 
                <lightning-combobox data-id={indx} name="Designation" label="Designation" value={value}
    
                options={pickval.data.values} onchange={ondespicChange}>
              
              </lightning-combobox>
            </div>
            <!-- Modal/Popup Box LWC footer starts here -->
            <footer class="slds-modal__footer">
                <button class="slds-button slds-button_neutral" onclick={closeModal} title="Cancel">Cancel</button>
                <div class="slds-align_absolute-center slds-p-top_small">                
                    <lightning-button name="Save" label="Save" onclick={saveRecord} ></lightning-button>
                </div>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
</template>
