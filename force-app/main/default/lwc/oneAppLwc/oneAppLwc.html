<template>
<lightning-card>
<template if:true={viewOneApp}>

    </template></template>

<!--RWA Segment Search Section -->

<template if:true={isRWAComp}>
    
    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_4-of-7">
        <lightning-input type="text"  label="Search"  placeholder="Minimum Three Character" value={searchValueRWA} onchange={searchKeywordRWA} style="width:19rem"></lightning-input>
        <lightning-button class="slds-m-left_x-medium" style="width:250px" label="Search Again" onclick={refreshComponent}></lightning-button>
        <lightning-button class="slds-m-left_x-medium" style="width:250px" label="Create New Record" onclick={navigateToNew}></lightning-button>
        <lightning-button class="slds-m-left_x-medium" style="width:250px" label="Back" onclick={onBackClickRWA} ></lightning-button>
    </div>
    <lightning-card title="RWA Records ">  
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_4-of-7 ">
            <div class="slds-scrollable " style="height:20rem;width:25rem">    
                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table--header-fixed">
                    <thead>
                    <tr class="slds-line-height_reset slds-text-title--caps">
                        <th class="" scope="col">
                            <a class="slds-th__action slds-text-link_reset " href="javascript:void(0);" role="button" tabindex="0" onclick={sortRecs} name="Name_of_Society__c">Name Of Society
                                <div if:true={isAsc}>
                                    &#9650;
                                </div>
                                <div if:true={isDsc}>
                                    &#9660;
                                </div>
                                
                            </a>
                        </th>
                       <th class="" scope="col">
                            <a class="slds-th__action slds-text-link_reset" href="javascript:void(0);" role="button" tabindex="0" onclick={sortRecs} name="Depot__r.Name">Depot
                                <div if:true={isAsc}>
                                    &#9650;
                                </div>
                                <div if:true={isDsc}>
                                    &#9660;
                                </div>
                            </a>
                        </th>
                        <th class="" scope="col">
                            <a class="slds-th__action slds-text-link_reset" href="javascript:void(0);" role="button" tabindex="0" onclick={sortRecs} name="Locality__r.Name">Locality
                                <div if:true={isAsc}>
                                    &#9650;
                                </div>
                                <div if:true={isDsc}>
                                    &#9660;
                                </div>
                            </a>
                        </th>
                        <th class="" scope="col">
                            <a class="slds-th__action slds-text-link_reset " href="javascript:void(0);" role="button" tabindex="0" onclick={sortRecs} name="Address__c">Address
                                <div if:true={isAsc}>
                                    &#9650;
                                </div>
                                <div if:true={isDsc}>
                                    &#9660;
                                </div>
                            </a>
                        </th>
                        <th class="" scope="col">
                         
                        </th>
                    </tr>
                    </thead>
                    
                    <tbody>   
                        <template if:true={segmentRecord}>
                        <template for:each={segmentRecord} for:item="seg">
                            <tr class="slds-hint-parent" key={seg.Id}>
                                <td>
                                    <div class="slds-truncate"><a onclick={handleClickLink} data-id={seg.Id}>{seg.Name_of_Society__c}</a>
                                    </div>
                                </td>
                                <td>
                                    <div class="slds-truncate">{seg.Depot__r.Name}</div>
                                </td>
                                <td>
                                    <div class="slds-truncate">{seg.Locality__r.Name}</div>
                                </td>
                                <td>
                                    <div class="slds-truncate">{seg.Address__c}</div>
                                </td>
                               
                            </tr>
                        </template>
                    </template>
                    </tbody>
                </table>
            </div>
        </div>
    </lightning-card>
    
</template>
