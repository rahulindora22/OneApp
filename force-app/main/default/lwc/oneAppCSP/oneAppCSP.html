<template if:true={isRWAComp}>

        <lightning-button class="slds-m-left_x-medium" style="width:250px" label="Search Again" onclick={refreshComponent}></lightning-button>

    </div>

                    <tr class="slds-line-height_reset slds-text-title--caps">

                                    &#9650;
                                </div>
                                <div if:true={isDsc}>
                                    &#9660;
                                </div>
                                
                            </a>
                        </th>
                        <th class="" scope="col">

                                </div>
                                <div if:true={isDsc}>
                                    &#9660;

                            </a>
                        </th>

                                </div>
                                <div if:true={isDsc}>
                                    &#9660;
                                </div>
                            </a>
                        </th>
                       <!-- <th class="" scope="col">
                            <a class="slds-th__action slds-text-link_reset " href="javascript:void(0);" role="button" tabindex="0" onclick={sortRecs} name="City__c">City
