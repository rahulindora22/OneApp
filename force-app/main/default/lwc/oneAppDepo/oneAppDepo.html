<template>
    <lightning-card title= "One App">
        <template if:true={viewOneApp}>
            <lightning-button variant="Neutral" label="DEPOT" title="Primary action" onclick={handleClickDepo} class="slds-m-left_x-small"></lightning-button>
            <lightning-button variant="Neutral" label="Back" onclick={onBackClickRWA} class="slds-m-left_x-small"></lightning-button>

            <template if:true={isDEPO}>
            </template>  
        </template>  
    </lightning-card>


    <!--DEPO Segment Start Here -->
    <template if:true={viewDEPO}>
        <lightning-card title="Existing DEPOT">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_4-of-7">
                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-m-top_small">
                    <thead>
                    <tr class="slds-line-height_reset">
                        <th class="" scope="col">
                            <div class="slds-truncate" title="Name">Depot Name</div>
                        </th>
                        <th class="" scope="col">
                            <div class="slds-truncate" title="Slab">Branch</div>
                        </th>
                        
                    </tr>
                    </thead>
                    
                    <tbody>   
                        <template for:each={depoSegmentRecord} for:item="dep">
                            <tr class="slds-hint-parent" key={dep.Id}>
                                <td>
                                    <div class="slds-truncate"><a onclick={handleClickLinkDEPO} data-id={dep.RMD_Territory_Master__c}>{dep.RMD_Territory_Master__r.Name}</a>
                                    </div>
                                </td>
                                <td>
                                    <div class="slds-truncate">{dep.RMD_Territory_Master__r.RMD_Branch__r.Name}</div>
                                </td>
                                
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>    
        </lightning-card>
    </template>

    <template if:true={viewSegmentRecordDEPO}>
        <lightning-card title= " DEPOT Details">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_4-of-7">
                <lightning-record-edit-form record-id={depoId} object-api-name="RMD_Territory_Master__c">
                    <div class="slds-grid" style="margin-left: 10px">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-output-field field-name="Name"></lightning-output-field>
                            <lightning-output-field field-name="RMD_SAP_Code__c"></lightning-output-field>
                           
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-output-field field-name="RMD_Territory_Type__c"></lightning-output-field>
                            <lightning-output-field field-name="RMD_Branch__c"></lightning-output-field> 
                        </div>
                    </div>
                    <div class="slds-align_absolute-center">
                        <template if:true={isCheckInShow}>
                        <lightning-button variant="brand" disabled={locationButtonDisabled} icon-name="utility:target" label="Check In"
                            title="Use your device's GPS and other location sensors to determine your current location"
                            class="slds-m-top_small" onclick={handleGetCurrentLocationClick}></lightning-button>
                           </template>
                           &nbsp;
                            <template if:true={isCheckInOutShow}>   
                            <lightning-button variant="destructive" disabled={locationButtonDisabled} icon-name="utility:target" label="Check Out"
                            class="slds-m-top_small" onclick={checkOutFromOneApp}></lightning-button>
                            </template>
                            &nbsp;
                        <lightning-button class="slds-m-top_small" label="Cancel" onclick={onBackSegmentViewDEPO} >
                        </lightning-button> 
                    </div>
                </lightning-record-edit-form>
            </div>    
        </lightning-card>
    </template>
</template>
</template>
